<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp - Pro Edition</title>
    <link rel="stylesheet" href="chat.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <header class="bar-header">
          <div class="profile-circle">
            <i class="fa-solid fa-user"></i>
          </div>
          <h3 class="app-title">ChatApp</h3>
          <div class="header-btns">
            <span class="logout-btn-wrapper" onclick="logout()" title="Logout">
              <i class="fa-solid fa-right-from-bracket"></i>
            </span>
          </div>
        </header>

        <div class="search-section">
          <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="text"
              id="searchEmail"
              placeholder="Search name or email..."
              onkeyup="filterSidebar()"
            />
          </div>
        </div>

        <div class="chat-list" id="chatList">
          <div class="section-container">
            <div class="section-header">
              <h4>Groups</h4>
              <button class="add-group-inline" onclick="openGroupModal()">
                <i class="fa-solid fa-plus"></i> Create
              </button>
            </div>
            <div id="availableGroups"></div>
          </div>

          <hr class="divider" />

          <div class="section-container">
            <div class="section-header">
              <h4>Direct Messages</h4>
            </div>
            <div id="availableUsers"></div>
          </div>
        </div>
      </aside>

      <main class="chat-window">
        <header class="bar-header">
          <div class="current-user">
            <div class="profile-circle small" id="headerIcon">
              <i class="fa-solid fa-comment-dots"></i>
            </div>
            <div class="header-info">
              <strong id="chatHeader">Select a Chat</strong>
              <p class="status" id="chatStatus">to start messaging</p>
            </div>
          </div>
          <div class="header-actions">
            <i class="fa-solid fa-phone"></i>
            <i class="fa-solid fa-video"></i>
            <i class="fa-solid fa-ellipsis-vertical"></i>
          </div>
        </header>

        <div id="welcomeScreen" class="welcome-container">
          <div class="welcome-content">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
              alt="Logo"
              width="80"
            />
            <h2>ChatApp Pro for Web</h2>
            <p>
              Send and receive messages without keeping your phone online.<br />
              Use ChatApp on up to 4 linked devices.
            </p>
            <div class="encryption-note">
              <i class="fa-solid fa-lock"></i> End-to-end encrypted
            </div>
          </div>
        </div>

        <div
          id="chatContent"
          style="
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
          "
        >
          <section class="message-container" id="chatBox"></section>

          <footer class="input-container">
            <form
              id="messageForm"
              style="display: flex; width: 100%; gap: 10px"
            >
              <div class="input-wrapper">
                <i
                  class="fa-solid fa-paperclip action-icon"
                  id="attachBtn"
                  style="cursor: pointer"
                ></i>
                <input
                  type="file"
                  id="fileInput"
                  style="display: none"
                  accept="image/*"
                />

                <input
                  type="text"
                  placeholder="Type a message..."
                  id="msgInput"
                  autocomplete="off"
                />
                <i class="fa-solid fa-face-smile action-icon"></i>
              </div>
              <button type="submit" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
              </button>
            </form>
          </footer>
        </div>
      </main>
    </div>

    <div id="groupModal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Create New Group</h3>
          <span class="close-btn" onclick="closeGroupModal()">&times;</span>
        </div>
        <div class="modal-body">
          <div class="form-group" style="margin-bottom: 15px">
            <label style="display: block; margin-bottom: 5px">Group Name</label>
            <input
              type="text"
              id="groupNameInput"
              placeholder="Enter group name..."
            />
          </div>
          <p class="select-label">Select Members:</p>
          <div id="modalUserList" class="modal-user-list"></div>
        </div>
        <div class="modal-footer">
          <button class="cancel-btn" onclick="closeGroupModal()">Cancel</button>
          <button class="confirm-btn" onclick="createNewGroup()">
            Create Group
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script type="module" src="./js/main.js"></script>

    <script>
      function logout() {
        if (confirm("Are you sure you want to logout?")) {
          localStorage.clear();
          window.location.href = "../signin/signin.html";
        }
      }
    </script>
  </body>
</html>
