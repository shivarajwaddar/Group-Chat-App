<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp - Full Screen</title>
    <link rel="stylesheet" href="chat.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <header class="bar-header">
          <div class="profile-circle"></div>
          <h3 class="app-title">ChatApp</h3>
          <span class="menu-label">Menu</span>
        </header>
        <div class="search-section">
          <input type="text" placeholder="Search or start new chat" />
        </div>
        <div class="chat-list">
          <div class="chat-item active">
            <div class="profile-circle"></div>
            <div class="chat-meta">
              <div class="chat-name">
                <strong>Global Group</strong> <small>Online</small>
              </div>
              <p>Public Chat Room</p>
            </div>
          </div>
        </div>
      </aside>

      <main class="chat-window">
        <header class="bar-header">
          <div class="current-user">
            <div class="profile-circle small"></div>
            <div>
              <strong>Global Group</strong>
              <p class="status">online</p>
            </div>
          </div>
          <span class="menu-label">Search</span>
        </header>

        <section class="message-container" id="chatBox"></section>

        <footer class="input-container">
          <span class="action-text">Attach</span>
          <input type="text" placeholder="Type a message" id="msgInput" />
          <span class="action-text send" onclick="sendMessage(event)"
            >Send</span
          >
        </footer>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
